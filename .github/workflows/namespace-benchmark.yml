# Benchmark: upstream's "Run native tests" job (main.yml `test_native`),
# steps copied verbatim, run on three runner classes at the same commit.
#
# Upstream baseline for reference (wasm-bindgen/wasm-bindgen, ubuntu-latest,
# last 5 runs on main as of 2026-07-13): 10m34s / 11m27s / 11m43s / 12m14s / 12m15s.
#
# Manual dispatch only. Never triggers on push or PR.
name: Namespace benchmark (native tests)

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  native-tests:
    name: native tests (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Control: same runner class upstream uses (4 vCPU / 16 GB)
          - runner: ubuntu-latest
            label: github-4vcpu
          # Like-for-like: Namespace at the same 4 vCPU / 16 GB
          - runner: nscloud-ubuntu-24.04-amd64-4x16
            label: namespace-4vcpu
          # What a sponsorship grant would actually provision
          - runner: nscloud-ubuntu-24.04-amd64-8x16
            label: namespace-8vcpu
          # Namespace cache volume: persists ~/.cargo and target/ across runs.
          # The dominant step's inner fixture builds all write to the shared
          # workspace target dir, so a warm volume should collapse it.
          # Profile has caching enabled in the dashboard (4x16, Ubuntu 24.04).
          # First run populates the volume; judge by the SECOND run.
          - runner: namespace-profile-benchmark1
            label: namespace-4vcpu-cachevol
            cache: true
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v7
    - name: Mount cache volume over cargo home and target dir
      if: matrix.cache
      uses: namespacelabs/nscloud-cache-action@v1
      with:
        path: |
          ~/.cargo
          ./target
    # Nightly must stay the literal "nightly" channel: build-std tests invoke
    # `cargo +nightly` and rustup auto-installs latest nightly (without rust-src)
    # if that channel name is absent. Stable is pinned to 1.96.1, the version in
    # upstream's baseline run (28915063187) — Rust 1.97.0 (2026-07-09) breaks 5
    # CLI reference-snapshot tests at this commit.
    - uses: dtolnay/rust-toolchain@nightly
      with:
        targets: wasm32-unknown-unknown,wasm32-wasip1
        components: rust-src
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.96.1
        targets: wasm32-unknown-unknown,wasm32-wasip1
    - uses: actions/setup-node@v6
      with:
        node-version: '24.15'
    # GitHub images preinstall Chrome/chromedriver and Firefox/geckodriver;
    # Namespace's Ubuntu image has neither, and one test-runner test
    # (run_in_dedicated_worker) needs a WebDriver + browser.
    - name: Install Chrome + matching chromedriver
      if: startsWith(matrix.runner, 'nscloud')
      run: |
        wget -qO /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get install -y -qq /tmp/chrome.deb
        ver=$(google-chrome --version | grep -oE '[0-9][0-9.]+')
        wget -qO /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/${ver}/linux64/chromedriver-linux64.zip"
        unzip -q /tmp/chromedriver.zip -d /tmp
        sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/
        chromedriver --version
    - run: npm i -g typescript
    - run: cargo test
    - run: cargo test -p wasm-bindgen-cli-support
    - run: cargo test -p wasm-bindgen-cli
    - run: cargo test -p wasm-bindgen-macro-support
    - run: cargo test -p wasm-bindgen-futures
    - run: cargo test -p wasm-bindgen-shared
    - run: cargo test -p wasm-bindgen-test-shared
